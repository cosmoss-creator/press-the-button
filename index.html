<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Press the Button</title>

<style>

body{
background:white;
font-family:Arial;
text-align:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

h1{
margin-bottom:40px;
}

#buttonimg{
width:200px;
cursor:pointer;
}

#video{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
}

iframe{
width:100%;
height:100%;
}

</style>
</head>

<body>

<h1>PRESS THE BUTTON</h1>

<img id="buttonimg"
src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Red_Button.svg/512px-Red_Button.svg.png"
onclick="rickroll()">

<div id="video">

<iframe
src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&controls=0"
frameborder="0"
allow="autoplay"
allowfullscreen>
</iframe>

</div>

<script>

function rickroll(){
document.body.innerHTML =
'<iframe width="100%" height="100%" src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1" frameborder="0" allow="autoplay"></iframe>';
}

</script>

</body>
</html>
